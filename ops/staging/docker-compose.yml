version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env.staging
    user: "1000:1000" # Container Hardening: chạy bằng user non-root (hoặc postgres default non-root)
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Bind to localhost so host-mode services can reach it
    networks:
      - internal_network
    cap_drop:
      - ALL

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379" # Bind to localhost for host-mode app services
    networks:
      - internal_network
    cap_drop:
      - ALL

  graphql:
    build:
      context: ../../
      dockerfile: ops/docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - db
      - redis
    network_mode: host
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  ui:
    build:
      context: ../../
      dockerfile: ops/docker/frontend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      - SITE_NAME=Commics
    depends_on:
      - graphql
    network_mode: host
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

networks:
  internal_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
