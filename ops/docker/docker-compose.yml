services:
  db:
    image: postgres:15-alpine
    profiles: [ "infra" ]
    environment:
      - POSTGRES_USER=commics
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=commics
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commics-net

  temporal-db:
    image: postgres:15-alpine
    profiles: [ "infra" ]
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5434:5432"
    volumes:
      - temporal_data:/var/lib/postgresql/data
    networks:
      - commics-net

  redis:
    image: redis:7-alpine
    profiles: [ "infra" ]
    ports:
      - "6380:6379"
    networks:
      - commics-net

  temporal:
    image: temporalio/auto-setup:latest
    profiles: [ "infra" ]
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    ports:
      - "7234:7233"
    depends_on:
      - temporal-db
    networks:
      - commics-net

  temporal-ui:
    image: temporalio/ui:latest
    profiles: [ "infra" ]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8081:8080"
    depends_on:
      - temporal
    networks:
      - commics-net

  graphql:
    build:
      context: ../../src/backend/graphql
      dockerfile: Dockerfile
    container_name: commics-graphql
    environment:
      - DATABASE_URL=postgres://commics:secret@db:5432/commics
      - REDIS_URL=redis://redis:6379/1
    ports:
      - "18000:8000"
    depends_on:
      - db
      - redis
    profiles: [ "services" ]
    networks:
      - commics-net

  crawler:
    build:
      context: ../../src/backend/crawler
      dockerfile: Dockerfile
    container_name: commics-crawler
    environment:
      - TEMPORAL_HOST=temporal:7233
      - DATABASE_URL=postgresql+asyncpg://commics:secret@db:5432/commics
      - REDIS_URL=redis://redis:6379/1
      - STORAGE_DATA_PATH=/storage_data
      - PYTHONUNBUFFERED=1
    volumes:
      - ./storage_data:/storage_data
    depends_on:
      - temporal
      - db
    profiles: [ "services" ]
    networks:
      - commics-net

  cdn:
    privileged: true
    build:
      context: ../../src/backend/cdn
      dockerfile: Dockerfile
    container_name: commics-cdn
    environment:
      - CDN__LISTEN=0.0.0.0:8686
      - CDN__FORMAT_NEGOTIATION=true
      - CDN__IMAGE__BASE_DIR=/storage_data
      - CDN__IMAGE__NO_WAIT=false
      - RUST_LOG=trace
      - CDN__IMAGE__DEFAULT_QUALITY=85
      - CDN__IMAGE__MAX_QUEUE=100
    ports:
      - "3005:8686"
    volumes:
      - ./storage_data:/storage_data
    profiles: [ "services" ]
    networks:
      - commics-net

  ui:
    build:
      context: ../../src/ui
      dockerfile: Dockerfile
    container_name: commics-ui
    environment:
      - PUBLIC_GRAPHQL_URL=http://host.docker.internal:18000/graphql
      - PUBLIC_CDN_URL=http://host.docker.internal:3005
      - NODE_ENV=production
    ports:
      - "4321:4321"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: [ "services" ]
    networks:
      - commics-net

volumes:
  postgres_data:
  temporal_data:


networks:
  commics-net:
    driver: bridge
