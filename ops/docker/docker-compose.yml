services:
  db:
    image: postgres:15-alpine
    profiles: [ "infra" ]
    environment:
      - POSTGRES_USER=commics
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=commics
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commics-net

  temporal-db:
    image: postgres:15-alpine
    profiles: [ "infra" ]
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5434:5432"
    volumes:
      - temporal_data:/var/lib/postgresql/data
    networks:
      - commics-net

  redis:
    image: redis:7-alpine
    profiles: [ "infra" ]
    ports:
      - "6380:6379"
    networks:
      - commics-net

  temporal:
    image: temporalio/auto-setup:latest
    profiles: [ "infra" ]
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    ports:
      - "7234:7233"
    depends_on:
      - temporal-db
    networks:
      - commics-net

  temporal-ui:
    image: temporalio/ui:latest
    profiles: [ "infra" ]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8081:8080"
    depends_on:
      - temporal
    networks:
      - commics-net

  graphql:
    build:
      context: ../../src/backend/graphql
      dockerfile: Dockerfile
    container_name: commics-graphql
    environment:
      - DATABASE_URL=postgres://commics:secret@db:5432/commics
      - REDIS_URL=redis://redis:6379/1
    ports:
      - "18000:8000"
    depends_on:
      - db
      - redis
    profiles: [ "services" ]
    networks:
      - commics-net

  crawler:
    build:
      context: ../../src/backend/crawler
      dockerfile: Dockerfile
    container_name: commics-crawler
    environment:
      - TEMPORAL_HOST=temporal:7233
      - DATABASE_URL=postgresql+asyncpg://commics:secret@db:5432/commics
      - REDIS_URL=redis://redis:6379/1
      - STORAGE_DATA_PATH=/storage_data
      - PYTHONUNBUFFERED=1
    volumes:
      - ./storage_data:/storage_data
    depends_on:
      - temporal
      - db
    profiles: [ "services" ]
    networks:
      - commics-net

  cdn:
    privileged: true
    build:
      context: ../../src/backend/cdn
      dockerfile: Dockerfile
    container_name: commics-cdn
    environment:
      - CDN__LISTEN=0.0.0.0:8686
      - CDN__FORMAT_NEGOTIATION=true
      - CDN__IMAGE__BASE_DIR=/storage_data
      - CDN__IMAGE__CACHE_DIR=/cdn_cache
      - CDN__IMAGE__NO_WAIT=false
      - RUST_LOG=trace
      - CDN__IMAGE__DEFAULT_QUALITY=85
      - CDN__IMAGE__MAX_QUEUE=100
    ports:
      - "3005:8686"
    volumes:
      - ./storage_data:/storage_data:ro
      - ./cdn_cache:/cdn_cache:rw
    profiles: [ "services" ]
    networks:
      - commics-net

  ui:
    build:
      context: ../../src/ui
      dockerfile: Dockerfile
    container_name: commics-ui
    environment:
      # SSR server-side fetch (đọc qua process.env lúc runtime, không bị bake lúc build)
      # Phải trỏ vào container 'graphql' vì chạy trong cùng network commics-net
      - GRAPHQL_URL_INTERNAL=http://graphql:8000/graphql
      - CACHE_URL=redis+memory://redis:6379?ttl=300000&lru=5000
      - SITE_URL=http://localhost:4321
      - SITE_NAME=FanManga
      - REVALIDATE_SECRET=change-me-in-production
      # Public vars (baked lúc build, dùng cho client-side / HTML meta tags)
      - PUBLIC_GRAPHQL_URL=http://localhost:18000/graphql
      - PUBLIC_CDN_URL=http://localhost:3005
      - NODE_ENV=production
    ports:
      - "4321:4321"
    profiles: [ "services" ]
    networks:
      - commics-net

  cms-api:
    build:
      context: ../../cms/api
      dockerfile: Dockerfile
    container_name: commics-cms-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://commics:secret@db:5432/commics
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - JWT_SECRET=super_secret_key
    ports:
      - "8000:8000"
    depends_on:
      - db
    profiles: [ "services" ]
    networks:
      - commics-net
    restart: always

  cms-fe:
    build:
      context: ../../cms/fe
      dockerfile: Dockerfile
    container_name: commics-cms-fe
    environment:
      - VITE_API_URL=http://localhost:8000/api
    ports:
      - "5174:5173"
    profiles: [ "services" ]
    networks:
      - commics-net
    restart: always

volumes:
  postgres_data:
  temporal_data:


networks:
  commics-net:
    driver: bridge
